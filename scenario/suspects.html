<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Suspects</title>
        <link rel="stylesheet" href="../styles/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>

    <body>
        <div class="container">
            <h1>3 Suspects...</h1>
            <p>These are the people you suspect of spreading the rumor, but who really did it?<br>
                Click on each person to learn more about them.</p>
            <div class="suspects">
                <div class="suspect-card" data-id="0">
                    <span class="suspect-name">Ava</span>
                    <span class="suspect-role">Best Friend</span>
                </div>

                <div class="suspect-card" data-id="1">
                    <span class="suspect-name">Cameron</span>
                    <span class="suspect-role">Ex Boyfriend</span>
                </div>

                <div class="suspect-card" data-id="2">
                    <span class="suspect-name">James</span>
                    <span class="suspect-role">Boyfriend</span>
                </div>
            </div>

            <div class="who-did-it">
                <p>Who do you think is behind the rumor?</p>
                <div class="button-row">
                    <button class="button" onclick="location.href='../endings/ava-ending.html'">Ava</button>
                    <button class="button" onclick="location.href='../endings/cameron-ending.html'">Cameron</button>
                    <button class="button" onclick="location.href='../endings/james-ending.html'">James</button>
                </div>
            </div>
        </div>

        <div id="overlay">
            <div id="modal">
                <button id="close-btn">&times;</button>
                <h2 id="modal-name"></h2>
                <p id="modal-role"></p>
                <p id="modal-bio"></p>
            </div>
        </div>

        <script>
            const suspects = [
                {
                    name: "Ava",
                    role: "Best Friend",
                    bio: "You and Ava have been best friends for 5 years. She isn't the sweetest person, but she definitely isn't worst. Today, you had a conversation with her.\nYou: 'Hey, Ava'\nAva: 'Oh my gosh did you hear that rumor about you?\nSo she does know.\nYou: 'Yeah. I was wondering who started it. People have been looking at me differently all day.'\nTo my surprise, Ava laughed.\nAva: 'You aren't even interesting enough for somebody to start a rumor about you.'\nRidiculous, right? But she's still your best friend so you had to have some trust in her for not starting a rumor about you."
                },
                {
                    name: "Cameron",
                    role: "Ex Boyfriend",
                    bio: "You dated Cameron for 2 months last year before he poured a gallon of punch on your head at your birthday party as a 'prank'. You've hated him ever since. You don't even want to see him, so you waited until after school to unblock and text his number.\nYou: 'Cameron, what's wrong with you?'\nHe left you on delivered for 5 hours and then replied with, 'What?'\nYou rolled your eyes in irritation and texted him back, 'I know you spread that rumor about me.'\nCameron: 'Woah woah, what rumor?'\nYou: 'You know exactly what I'm talking about. Don't play dumb with me.'\nYou could feel him smiling through the screen.\nCameron: 'Well you deserve it, loser.'\nAnd just like that, he blocked you, leaving you fuming in frustration."
                },
                {
                    name: "James",
                    role: "Boyfriend",
                    bio: "You've been with James for 5 months now. He knew everything about you: your hobbies, passions, family—everything. You knew everything about him too. He was the kindest person you've ever met. You sat with him at lunch since Ava decided to sit with her other friends.\nYou: 'Did you hear about what people have been saying about me?'\nJames' expression shifted. 'No, what happened?'\nYou: 'People have been talking and laughing about me behind my back.'\nHe held my hand. 'They're all weird. Ignore them.'\nYou smile at him. He always knew how to make you feel better. He was the only person that was truly there for you."
                }
            ];

            const overlay = document.getElementById('overlay');

            function openModal(id) {
                const s = suspects[id];
                document.getElementById('modal-name').textContent = s.name;
                document.getElementById('modal-role').textContent = s.role;
                document.getElementById('modal-bio').textContent = s.bio;
                overlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeModal() {
                overlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            document.querySelectorAll('.suspect-card').forEach(card => {
                card.addEventListener('click', () => openModal(parseInt(card.dataset.id)));
            });

            document.getElementById('close-btn').addEventListener('click', closeModal);

            overlay.addEventListener('click', e => {
                if (e.target === overlay) closeModal();
            });

            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') closeModal();
            });
        </script>
    </body>
</html>
